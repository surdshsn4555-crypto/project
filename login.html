<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Login - FinTrack Pro</title>
</head>

<body>
    <div class="flex h-screen justify-center items-center bg-gray-100">
        <div class="bg-white p-8 rounded-lg shadow-md size-[400px] flex flex-col justify-center gap-4">
            <div class="text-2xl text-center font-bold">Welcome Back</div>
            <div class="text-center font-sm">Login to FinTrack Pro</div>
            <div>
                <div>
                    <div class="text-lg font-sm">
                        Username
                    </div>
                    <div class="flex items-center gap-2 border-2 border-gray-300 rounded-md p-2 w-full">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Enter your username" id="loginUsername"
                            class="w-full outline-none">
                    </div>
                </div>
            </div>
            <div>
                <div class="text-lg font-sm">
                    Password
                </div>
                <div class="flex items-center gap-2 border-2 border-gray-300 rounded-md p-2 w-full">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPasswd" placeholder="Enter your password" class="w-full outline-none">
                    <i class="fa-solid fa-eye-slash" id="passwdEye2"></i>
                </div>
            </div>
            <div class="bg-blue-900 p-2 text-center text-white rounded-lg mt-4" id="loginBtn">Login</div>
            <div class="text-center">Don't have an account? <a class="text-blue-600" href="register.html">Register
                    here</a></div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
